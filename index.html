<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>butter_cookie_Cookie-IDLE 餅乾吃吃</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <!-- v1.19 -->
  <link rel="stylesheet" href="css/style.css?v=1.19" />
</head>

<body>
  <canvas id="gameCanvas"></canvas>
  <div id="counter">
    <div class="icon"></div><span id="count">0</span>
  </div>
  <div id="cookie-onscreen" class="hud">
    <span>餅乾數量</span>
    <span id="cookie_onscreen_count">0</span>
  </div>
  <div id="openButton"><img src="cookie/cookie_butter.png" alt="商店" /></div>
  <!-- 商店視窗（popup 內） -->
  <div id="popup">
    <div class="closeBtn">X</div>
    <h1>奶油餅乾商店</h1>
    <div class="shop-content">
      <!-- 升級：出現次數 -->
      <div class="shop-item">
        <div class="shop-label">奶油餅乾出現數量</div>
        <div class="shop-level">
          LV.<span id="lv-count">0</span> / 30
        </div>
        <div>花費 <span id="cost-count">10</span> 餅乾</div>
        <button id="btn-count">+1</button>
      </div>
      <!-- 升級：出現速度 -->
      <div class="shop-item">
        <div class="shop-label">奶油餅乾出現速度</div>
        <div class="shop-level">LV.<span id="lv-speed">0</span> / 50</div>
        <div>花費 <span id="cost-speed">10</span> 餅乾</div>
        <button id="btn-speed">+1</button>
      </div>
      <div class="shop-item">
        <div class="shop-label">奶油餅乾獲得數量</div>
        <div class="shop-level">LV.<span id="lv-gain">0</span> / 400</div>
        <div>花費 <span id="cost-gain">500</span> 餅乾</div>
        <button id="btn-gain">+1</button>
      </div>
      <!-- 吃餅乾速度升級 -->
      <div class="shop-item">
        <div class="shop-label">吃餅乾的速度</div>
        <div class="shop-level">LV.<span id="lv-eat">0</span> / 30</div>
        <div>花費 <span id="cost-eat">100</span> 餅乾</div>
        <button id="btn-eat">+1</button>
      </div>
      <div class="shop-item">
        <div class="shop-label">招喚小夥伴</div>
        <div class="shop-level">LV.<span id="lv-summon">0</span> / 3</div>
        <div>花費 <span id="cost-summon">200</span> 餅乾</div>
        <button id="btn-summon">+1</button>
      </div>
      <!-- 解鎖巧克力餅乾（效果尚未實作，本次版本先不動） -->
      <div class="shop-item">
        <div class="shop-label">解鎖巧克力餅乾</div>
        <div class="shop-level">LV.<span id="lv-choco">0</span> / 1</div>
        <div>花費 <span id="cost-choco">10000</span> 餅乾</div>
        <button id="btn-choco">+1</button>
      </div>
    </div>
  </div>

  <!-- v1.19：只需要載入 core.js 與 ui.js 這兩個進入點，
       其餘模組（utils/state/config/hud/eater/companion/save）都會透過 import 自動載入。
       注意：type="module" 的 script 不能像一般 <script> 一樣加 ?v= 版本參數來破快取，
       因為瀏覽器會把「網址（含問號參數）」當成模組的唯一身分，
       這裡若加了 ?v=，跟 ui.js 內部 import './core.js'（沒有問號）網址對不上，
       就會被當成兩個不同模組，core.js 整份程式碼因此重複執行兩次，
       導致畫面上餅乾數量顯示成兩倍——這正是這次修正的問題根源。 -->
  <script type="module" src="js/core.js"></script>
  <script type="module" src="js/ui.js"></script>
</body>

</html>
